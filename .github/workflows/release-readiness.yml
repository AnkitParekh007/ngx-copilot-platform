name: Release Readiness

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: Deployed backend base URL to smoke test
        required: false
        type: string
  release:
    types: [prereleased, released]

jobs:
  smoke-production-contract:
    runs-on: ubuntu-latest
    env:
      BACKEND_URL: ${{ inputs.backend_url || secrets.RELEASE_BACKEND_URL }}
      COPILOT_API_KEY: ${{ secrets.RELEASE_COPILOT_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate required smoke inputs
        run: |
          test -n "$BACKEND_URL" || (echo "Missing BACKEND_URL or RELEASE_BACKEND_URL secret" && exit 1)
          test -n "$COPILOT_API_KEY" || (echo "Missing RELEASE_COPILOT_API_KEY secret" && exit 1)

      - name: Smoke deployed backend contract
        run: node scripts/smoke-platform-backend.mjs --url="$BACKEND_URL"
