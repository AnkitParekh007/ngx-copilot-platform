name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @ankit-parekh-007/ngx-copilot-sdk build

      - name: Lint SDK
        run: pnpm --filter @ankit-parekh-007/ngx-copilot-sdk lint

      - name: Test SDK
        run: pnpm --filter @ankit-parekh-007/ngx-copilot-sdk test

      - name: Dry-run pack SDK
        run: cd dist/sdk && npm publish --dry-run

      - name: Build demo app
        run: pnpm --filter demo-app build

      - name: Build admin UI
        run: pnpm --filter admin-ui build

      - name: Typecheck backend
        run: pnpm --filter @ngx-copilot/backend typecheck

      - name: Test backend contracts
        run: pnpm --filter @ngx-copilot/backend test

      - name: Build example consumer
        run: pnpm --filter example-consumer build
        env:
          # Stub env vars so Angular build doesn't fail without runtime config
          NG_APP_API_URL: https://stub.example.com
          NG_APP_API_KEY: stub-key

      - name: Build backend
        run: pnpm --filter @ngx-copilot/backend build
        env:
          # Stub env vars so Next.js build doesn't fail without real credentials
          NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key
          SUPABASE_SERVICE_ROLE_KEY: stub-service-role-key
          KV_REST_API_URL: https://stub.upstash.io
          KV_REST_API_TOKEN: stub-token
          COPILOT_API_KEYS: cpk_stub_key
          OPENAI_API_KEY: sk-stub
