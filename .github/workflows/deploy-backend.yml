name: Deploy Backend

# Builds and verifies the backend on every main push that touches packages/backend/.
# Deployment is performed manually or via your chosen platform's own CI integration.
# See commented options below for Railway, Fly.io, Render, or self-hosted SSH.

on:
  push:
    branches: [main]
    paths:
      - 'packages/backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: pnpm --filter @ngx-copilot/backend build
        env:
          # Stub env vars so Next.js build doesn't fail without real credentials
          NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key
          SUPABASE_SERVICE_ROLE_KEY: stub-service-role-key
          KV_REST_API_URL: https://stub.upstash.io
          KV_REST_API_TOKEN: stub-token
          COPILOT_API_KEYS: cpk_stub_key
          OPENAI_API_KEY: sk-stub

      # ------------------------------------------------------------------
      # DEPLOYMENT — uncomment the option that matches your host
      # ------------------------------------------------------------------

      # Option A: Railway
      # Secrets needed: RAILWAY_TOKEN, RAILWAY_SERVICE_ID
      #
      # - name: Deploy to Railway
      #   uses: railwayapp/github-actions@v1
      #   with:
      #     railway-token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: ${{ secrets.RAILWAY_SERVICE_ID }}
      #     root-directory: packages/backend

      # Option B: Fly.io
      # Secrets needed: FLY_API_TOKEN
      # Requires a fly.toml inside packages/backend/
      #
      # - name: Set up flyctl
      #   uses: superfly/flyctl-actions/setup-flyctl@master
      # - name: Deploy to Fly.io
