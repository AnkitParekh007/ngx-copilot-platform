name: Deploy Backend

# Builds and verifies the backend on every main/master push that touches packages/backend/.
# Public rollout should run the release-readiness smoke workflow against the deployed target
# before enabling traffic or cutting a release.
# Deployment step is intentionally left as a commented template - uncomment and adapt
# for whichever hosting platform you use (Railway, Fly.io, Render, Docker/SSH, etc.).

on:
  push:
    branches: [main, master]
    paths:
      - 'packages/backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: pnpm --filter @ngx-copilot/backend build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key
          SUPABASE_SERVICE_ROLE_KEY: stub-service-role-key
          KV_REST_API_URL: https://stub.upstash.io
          KV_REST_API_TOKEN: stub-token
          COPILOT_API_KEYS: cpk_stub_key
          OPENAI_API_KEY: sk-stub

      # ------------------------------------------------------------------
      # DEPLOYMENT - uncomment ONE of the options below and add the
      # required secrets in your GitHub repo Settings -> Secrets.
      # ------------------------------------------------------------------

      # Option A: Railway
      # Secrets needed: RAILWAY_TOKEN, RAILWAY_SERVICE_ID
      #
      # - name: Deploy to Railway
      #   uses: railwayapp/github-actions@v1
      #   with:
      #     railway-token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: ${{ secrets.RAILWAY_SERVICE_ID }}
      #     root-directory: packages/backend

      # Option B: Fly.io
      # Secrets needed: FLY_API_TOKEN
      # Requires a fly.toml inside packages/backend/
      #
      # - name: Deploy to Fly.io
      #   uses: superfly/flyctl-actions/setup-flyctl@master
      # - run: flyctl deploy --remote-only
      #   working-directory: packages/backend
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Option C: Render
      # Secrets needed: RENDER_DEPLOY_HOOK_URL
      #
      # - name: Deploy to Render
      #   run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      # Option D: Self-hosted via SSH + Docker
