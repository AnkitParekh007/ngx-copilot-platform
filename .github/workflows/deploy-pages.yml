name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test SDK
        run: pnpm --filter @ngx-copilot/sdk test

      - name: Lint SDK
        run: pnpm --filter @ngx-copilot/sdk lint

      - name: Build SDK
        run: pnpm --filter @ngx-copilot/sdk build

      - name: Build demo app (GitHub Pages)
        run: pnpm --filter demo-app build:gh-pages

      - name: Detect output directory
        id: detect-dir
        run: |
          if [ -f "dist/demo-app/browser/index.html" ]; then
            echo "pages_dir=dist/demo-app/browser" >> $GITHUB_OUTPUT
          else
            echo "pages_dir=dist/demo-app" >> $GITHUB_OUTPUT
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.detect-dir.outputs.pages_dir }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
