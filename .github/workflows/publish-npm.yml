name: Publish SDK to npm

# Trigger on GitHub release published or manual dispatch.
#
# NPM PUBLISHING OPTIONS:
#
# Option A: Trusted Publishing (preferred, no NPM_TOKEN needed)
# 1. Log in to npmjs.com and open the package page for
#    @ankit-parekh-007/ngx-copilot-sdk.
# 2. Navigate to Settings -> Publishing -> Trusted Publishers.
# 3. Add a new Trusted Publisher:
#    - Ecosystem: npm
#    - Repository owner: AnkitParekh007
#    - Repository name: ngx-copilot-platform
#    - Workflow filename: publish-npm.yml
#    - Environment name: npm-publish (optional)
# 4. The id-token: write permission below handles OIDC token exchange.
#
# Option B: NPM token fallback
# - Add repository secret: NPM_TOKEN
# - The workflow will use token auth automatically when present.
#
# Reference: https://docs.npmjs.com/generating-provenance-statements

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # environment: npm-publish  # Uncomment to add approval gate

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Upgrade npm for Trusted Publishing
        run: npm install --global npm@^11.5.1

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Show tool versions
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @ankit-parekh-007/ngx-copilot-sdk test

      - name: Build SDK
        run: pnpm --filter @ankit-parekh-007/ngx-copilot-sdk build

      - name: Dry-run publish
        working-directory: dist/sdk
        run: npm publish --dry-run

      - name: Publish to npm
        working-directory: dist/sdk
        run: npm publish --provenance --access public
