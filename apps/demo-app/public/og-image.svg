<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05060a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b8cff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b8cff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5b8cff" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow orb -->
  <ellipse cx="600" cy="200" rx="400" ry="200" fill="#5b8cff" opacity="0.07" filter="url(#blur)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Logo icon -->
  <rect x="72" y="180" width="72" height="72" rx="16" fill="url(#accent)"/>
  <line x1="92" y1="204" x2="124" y2="204" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <line x1="92" y1="216" x2="120" y2="216" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <line x1="92" y1="228" x2="122" y2="228" stroke="#fff" stroke-width="4" stroke-linecap="round"/>

  <!-- Package name -->
  <text x="164" y="202" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="22" fill="#5b8cff" font-weight="500" letter-spacing="0.5">@ankit-parekh-007/</text>
  <text x="164" y="232" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="28" fill="#ffffff" font-weight="700" letter-spacing="-0.5">ngx-copilot-sdk</text>

  <!-- Preview badge -->
  <rect x="72" y="272" width="108" height="30" rx="15" fill="none" stroke="#5b8cff" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="126" y="291" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#5b8cff" font-weight="600" text-anchor="middle" letter-spacing="1">0.1.1 PREVIEW</text>

  <!-- Main headline -->
  <text x="72" y="380" font-family="ui-sans-serif, system-ui, sans-serif" font-size="58" fill="#ffffff" font-weight="800" letter-spacing="-1.5">AI Copilot SDK</text>
  <text x="72" y="448">
    <tspan font-family="ui-sans-serif, system-ui, sans-serif" font-size="58" font-weight="800" letter-spacing="-1.5" fill="url(#accent)">for Angular</tspan>
  </text>

  <!-- Tagline -->
  <text x="72" y="510" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" fill="#94a3b8" letter-spacing="0">Streaming chat · RAG citations · Tool timelines · Approval gates</text>

  <!-- Right: feature chips -->
  <g transform="translate(800, 180)">
    <!-- Chip 1 -->
    <rect width="300" height="46" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="20" y="29" font-family="ui-monospace, monospace" font-size="15" fill="#86efac" font-weight="500">provideCopilot(config)</text>

    <!-- Chip 2 -->
    <rect y="58" width="300" height="46" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="20" y="87" font-family="ui-monospace, monospace" font-size="15" fill="#93c5fd" font-weight="500">CopilotShellComponent</text>

    <!-- Chip 3 -->
    <rect y="116" width="300" height="46" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="20" y="145" font-family="ui-monospace, monospace" font-size="15" fill="#c4b5fd" font-weight="500">HttpCopilotBackendAdapter</text>

    <!-- Chip 4 -->
    <rect y="174" width="300" height="46" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="20" y="203" font-family="ui-monospace, monospace" font-size="15" fill="#fcd34d" font-weight="500">RagResult · ApprovalRequest</text>

    <!-- Chip 5 -->
    <rect y="232" width="300" height="46" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="20" y="261" font-family="ui-monospace, monospace" font-size="15" fill="#fb923c" font-weight="500">ToolTimelineItem · SSE stream</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#ffffff" fill-opacity="0.02"/>
  <text x="72" y="615" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#475569">ankitparekh007.github.io/ngx-copilot-platform</text>
  <text x="1128" y="615" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#475569" text-anchor="end">MIT License</text>
</svg>
